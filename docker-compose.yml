version: "3.9"

name: real-time-matching-system

services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

  api-gateway:
    build: ./api-gateway
    env_file:
      - ./api-gateway/.env
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - redis
  
  matching-service:
    build: 
      context: .
      dockerfile: ./matching-service/Dockerfile
    env_file:
      - ./matching-service/.env
    container_name: matching-service
    ports:
      - "8081:8081"
    depends_on:
      - redis

